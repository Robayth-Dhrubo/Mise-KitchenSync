name: Export Diagrams

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/diagrams/*.mmd'

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Export diagrams
        run: |
          npx mmdc -p puppeteer-config.json -i docs/diagrams/high-level.mmd -o docs/diagrams/high-level.png
          npx mmdc -p puppeteer-config.json -i docs/diagrams/order-sequence.mmd -o docs/diagrams/order-sequence.png
          npx mmdc -p puppeteer-config.json -i docs/diagrams/ci-flow.mmd -o docs/diagrams/ci-flow.png
      - name: Commit diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/*.png || true
          git commit -m "chore: export diagrams" || true
          git push origin HEAD:main || true
